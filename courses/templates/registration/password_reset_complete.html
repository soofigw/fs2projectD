{% extends "base.html" %}

{% block title %}
Contraseña Actualizada
{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="p-4 p-md-5 glass-card auth-card shadow-sm mt-4 text-center">

                <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-success-subtle text-success mb-3" style="width: 4rem; height: 4rem;">
                    <i class="bi bi-check-circle-fill fs-2"></i>
                </div>

                <h2 class="fw-bold mb-3">
                    Contraseña Actualizada
                </h2>

                <p class="text-body-secondary">
                    Tu contraseña fue restablecida correctamente.
                </p>

                <a href="{% url 'login' %}"
                   class="btn btn-primary premium-btn mt-3">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión
                </a>

            </div>

        </div>
    </div>
</div>
{% endblock %}
