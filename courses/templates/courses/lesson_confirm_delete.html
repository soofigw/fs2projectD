{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0">

                <div class="card-body p-5 text-center">

                    <h2 class="fw-bold text-danger mb-3">
                        🗑️ Eliminar Lección
                    </h2>

                    <p class="text-muted">
                        ¿Seguro que deseas eliminar la lección
                        <strong>{{ object.title }}</strong>?
                    </p>

                    <form method="post">

                        {% csrf_token %}

                        <button
                            type="submit"
                            class="btn btn-danger">
                            Eliminar
                        </button>

                        <a href="{% url 'courses:course_detail' object.course.identifier %}"
                           class="btn btn-secondary">
                            Cancelar
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
